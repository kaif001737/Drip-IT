{% extends "base.html" %}

{% block content %}
<section style="min-height: calc(100vh - 220px); display: grid; place-items: center; padding: 3rem 1.5rem;">
    <div style="text-align: center; max-width: 640px;">
        <p style="font-family: var(--font-mono); color: var(--muted); letter-spacing: 0.08em; margin-bottom: 0.75rem;">ERROR 404</p>
        <h1 style="font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 1rem;">Page Not Found</h1>
        <p style="font-size: 1.05rem; color: var(--muted); line-height: 1.7; margin-bottom: 2rem;">
            The page you requested does not exist or may have been moved.
        </p>
        <a href="/" style="display: inline-block; text-decoration: none; border: 1px solid rgba(255,255,255,0.25); color: var(--white); padding: 0.8rem 1.4rem; border-radius: 999px;">
            Return Home
        </a>
    </div>
</section>
{% endblock %}
